# ============================================================
# Perfil: TEST
# ------------------------------------------------------------
# Ativo automaticamente pela classe AbstractControllerTests via
# @ActiveProfiles("test"). Aponta para o banco de teste local
# (fiis_test) no mesmo container Postgres usado em desenvolvimento.
#
# Pré-requisitos antes de rodar os testes:
#   1) Docker Desktop aberto
#   2) docker start fiis-postgres
#   3) docker exec fiis-postgres psql -U renlip -d fiis \
#        -c "CREATE DATABASE fiis_test;"
#      (só precisa rodar uma vez)
# ============================================================

# -- DataSource --
# Os valores podem ser sobrescritos via variáveis de ambiente
# (útil na esteira de CI/CD no futuro).
spring.datasource.url=${TEST_DATABASE_URL:jdbc:postgresql://localhost:5432/fiis_test}
spring.datasource.username=${TEST_DATABASE_USERNAME:renlip}
spring.datasource.password=${TEST_DATABASE_PASSWORD:fiis123}
spring.datasource.driver-class-name=org.postgresql.Driver

# -- JPA / Hibernate --
# "create-drop": Hibernate cria o schema ao iniciar e dropa ao finalizar.
# Assim as entidades continuam sendo a fonte da verdade do schema,
# e cada execução de testes começa com um banco estruturalmente limpo.
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false

# -- Logging --
# Mantém os logs limpos durante os testes; habilite DEBUG pontualmente
# se precisar investigar problemas em um teste específico.
logging.level.com.renlip.fiis=INFO
logging.level.org.springframework.test=WARN
logging.level.org.hibernate.SQL=WARN
