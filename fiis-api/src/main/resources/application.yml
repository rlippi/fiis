spring:
  application:
    name: fiis-api

  # Profile ativo padrão: dev
  # Para trocar, use: -Dspring.profiles.active=hml (ou prod)
  profiles:
    active: dev

  # JPA / Hibernate - configurações comuns a todos os ambientes
  jpa:
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  # Flyway - versionamento de schema do banco
  #
  # baseline-on-migrate=true permite adotar o Flyway em bancos já existentes
  # (ex: HML no Supabase, onde as tabelas foram criadas pelo Hibernate antes
  # da FASE 6.1). Quando um banco tem tabelas mas não tem flyway_schema_history,
  # o Flyway cria a tabela de histórico e marca baseline-version como aplicada,
  # sem re-executar as migrations <= baseline-version.
  #
  # baseline-version=1 significa: em banco já populado, a V1 é considerada
  # "já aplicada" e não é re-executada (evita colisão de CREATE TABLE).
  # Em banco vazio (fresh install), Flyway roda a V1 normalmente, porque a
  # lógica de baseline só dispara em schemas não vazios.
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 1

  # MessageSource - mensagens da API resolvidas por chave em messages_pt_BR.properties
  messages:
    basename: messages
    encoding: UTF-8
    fallback-to-system-locale: false

  # Spring MVC - handling de rotas inexistentes
  # throw-exception-if-no-handler-found=true faz o DispatcherServlet lançar NoHandlerFoundException
  # em vez de fazer forward interno para /error. Isso permite que o GlobalExceptionHandler capture
  # e devolva um 404 no formato padrão ErroResponse.
  mvc:
    throw-exception-if-no-handler-found: true

  # Desabilita o handling de resources estáticos padrão (default mappings para /static, /public, etc.)
  # Sem isso, o Spring tenta servir um recurso estático para rotas inexistentes antes de chegar no
  # DispatcherServlet, o que impede o NoHandlerFoundException de ser lançado.
  web:
    resources:
      add-mappings: false

  # Thymeleaf: engine usado apenas para templates de email em src/main/resources/templates/emails.
  # Cache desligado facilita iteração em dev (recarrega ao editar). Prod pode ligar se quiser.
  thymeleaf:
    cache: false
    prefix: classpath:/templates/
    suffix: .html
    mode: HTML
    encoding: UTF-8

  # Mail: credenciais SMTP. Em dev, ficar em branco — o fiis.mail.enabled abaixo deve ser false,
  # assim o EmailService apenas loga o conteúdo em vez de tentar enviar.
  # Em HML/PROD, usar app password do Gmail via env vars.
  mail:
    host: ${SPRING_MAIL_HOST:smtp.gmail.com}
    port: ${SPRING_MAIL_PORT:587}
    username: ${SPRING_MAIL_USERNAME:}
    password: ${SPRING_MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
        transport:
          protocol: smtp

# JWT - segredo via env var em ambientes remotos; default só para dev local
fiis:
  jwt:
    secret: ${FIIS_JWT_SECRET:chave-de-desenvolvimento-com-32-bytes-minimo-para-hs256}
    ttl-millis: 86400000
    issuer: fiis-api

  # Rate limiting in-memory (Bucket4j) nos endpoints públicos de autenticação.
  # login: por e-mail, protege contra brute force em uma conta específica.
  # signup: por IP, evita criação em massa de contas a partir do mesmo cliente.
  # forgot-password: por e-mail, evita flood de emails de reset para a mesma conta.
  rate-limit:
    login:
      capacidade: 5
      duracao-minutos: 15
    signup:
      capacidade: 3
      duracao-minutos: 60
    forgot-password:
      capacidade: 3
      duracao-minutos: 15

  # Parâmetros do token de reset de senha
  reset-token:
    ttl-minutos: 30

  # Envio de emails transacionais.
  # enabled=false faz o EmailService apenas logar o conteúdo (útil em dev sem SMTP).
  # frontend-url alimenta os links clicados nos emails.
  mail:
    enabled: ${FIIS_MAIL_ENABLED:false}
    from-address: ${FIIS_MAIL_FROM:fiis.app.noreply@gmail.com}
    frontend-url: ${FIIS_FRONTEND_URL:http://localhost:4200}

  # Caches locais (Caffeine). Cada sub-chave representa um cache nomeado.
  #
  # ultima-cotacao:
  #   ttl-minutos: tempo de vida de cada entrada (rede de segurança caso algum
  #                @CacheEvict deixe de disparar). 30min é seguro: cotações
  #                mudam só 1x/dia (job das 19h ou disparo manual), e qualquer
  #                escrita explícita já invalida via @CacheEvict.
  #   max-size:    tamanho máximo do cache (entradas). 500 acomoda dezenas de
  #                carteiras simultâneas — cada usuário tem ~10 fundos.
  cache:
    ultima-cotacao:
      ttl-minutos: ${FIIS_CACHE_ULTIMA_COTACAO_TTL_MIN:30}
      max-size: ${FIIS_CACHE_ULTIMA_COTACAO_MAX_SIZE:500}

  # Jobs agendados (@Scheduled). Cada sub-chave representa um job.
  #
  # atualizar-cotacoes:
  #   enabled: liga/desliga o agendamento sem redeploy (env var FIIS_JOB_ATUALIZAR_COTACOES_ENABLED).
  #            O endpoint manual POST /api/jobs/atualizar-cotacoes continua funcionando mesmo com
  #            enabled=false.
  #   cron:    expressão Spring de 6 campos (seg min hora dia mês diaSemana). O default dispara
  #            todo dia útil às 19:00, janela confortável depois do fechamento do pregão B3 (18h).
  #            Fim de semana é pulado porque a BRAPI retorna o valor de sexta — seria gasto
  #            desnecessário de request.
  job:
    atualizar-cotacoes:
      enabled: ${FIIS_JOB_ATUALIZAR_COTACOES_ENABLED:true}
      cron: ${FIIS_JOB_ATUALIZAR_COTACOES_CRON:0 0 19 * * MON-FRI}

# BRAPI - integração com cotações do mercado (https://brapi.dev)
# token é opcional: free tier funciona sem autenticação. Se preenchido, é
# enviado como query string para usar o rate limit do plano pago.
# timeout-millis aplica-se tanto ao connect quanto ao read da chamada HTTP.
brapi:
  url: ${BRAPI_URL:https://brapi.dev}
  token: ${BRAPI_TOKEN:}
  timeout-millis: ${BRAPI_TIMEOUT_MS:5000}

# Resilience4j: tolerância a falhas para chamadas externas.
#
# A instância "brapi" é referenciada pelas annotations @Retry e @CircuitBreaker
# em BrapiTickerFetcher#buscarTicker. Os patterns são empilhados na ordem default
# do framework: Retry envolve CircuitBreaker, ou seja, o retry roda primeiro e,
# se o CB estiver aberto, sua CallNotPermittedException é capturada por
# `ignore-exceptions` para não iniciar uma nova rodada de retries.
#
# Retry:
#   - 3 tentativas (1 original + 2 retries) com backoff exponencial 500ms→1s→2s
#   - retry-exceptions: 5xx (HttpServerErrorException) e timeouts/conn (ResourceAccessException)
#   - 4xx NÃO retenta (já é Optional.empty no fetcher, nem chega aqui)
#   - ignore-exceptions: CallNotPermittedException — se o CB bloqueou, não retentar
#
# CircuitBreaker (sliding-window contagem-baseada):
#   - sliding-window-size=10: olha as últimas 10 chamadas
#   - minimum-number-of-calls=5: precisa de pelo menos 5 chamadas antes de avaliar
#   - failure-rate-threshold=50%: abre se metade das últimas 10 falharem
#   - wait-duration-in-open-state=30s: tempo aberto antes de tentar half-open
#   - permitted-number-of-calls-in-half-open-state=3: chamadas-piloto para decidir
#     se volta a fechar (sucesso) ou reabre (falha)
#   - automatic-transition-from-open-to-half-open-enabled=true: timer dispara
#     a transição sozinho, sem precisar de chamada externa que "acorde" o estado
resilience4j:
  retry:
    instances:
      brapi:
        max-attempts: 3
        wait-duration: 500ms
        exponential-backoff-multiplier: 2
        retry-exceptions:
          - org.springframework.web.client.HttpServerErrorException
          - org.springframework.web.client.ResourceAccessException
        ignore-exceptions:
          - io.github.resilience4j.circuitbreaker.CallNotPermittedException
  circuitbreaker:
    instances:
      brapi:
        sliding-window-type: COUNT_BASED
        sliding-window-size: 10
        minimum-number-of-calls: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 3
        automatic-transition-from-open-to-half-open-enabled: true

# Swagger UI - ordenação alfabética das tags (deixa "Autenticação" no topo)
springdoc:
  swagger-ui:
    tags-sorter: alpha

# Actuator: endpoints expostos e detalhes de health/metrics.
#
# Endpoints expostos:
#   - health: usado por health check do Render (público em SecurityConfig)
#   - info: versão da app + build info (público — expõe só metadata inócua)
#   - metrics: lista todas as métricas Micrometer (admin-only — vaza volume operacional)
#   - prometheus: dump em formato Prometheus para scraping (admin-only — pesado, alvo de DDoS)
#
# Tags globais: as métricas saem com `application=fiis-api` automaticamente, o que
# facilita filtrar por serviço quando outros backends compartilharem o mesmo Grafana.
#
# health-mail: o spring-boot-starter-mail adiciona um health indicator que tenta conectar
# no SMTP. Sem desligar, /actuator/health falha em dev (mail em modo log-only sem senha).
#
# show-details=when-authorized expõe detalhes (DB, disco, etc.) só para usuários
# autenticados; scrapers anônimos veem só status UP/DOWN.
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized
  health:
    mail:
      enabled: false
  metrics:
    tags:
      application: fiis-api

# Porta da API (Render injeta ${PORT}; default 8081 em dev local)
server:
  port: ${PORT:8081}

# Encoding dos logs: evita caracteres corrompidos em consoles Windows
# (acentuação PT-BR fica legível tanto no console quanto em arquivos)
logging:
  charset:
    console: UTF-8
    file: UTF-8
