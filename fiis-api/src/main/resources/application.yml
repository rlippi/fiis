spring:
  application:
    name: fiis-api

  # Profile ativo padrão: dev
  # Para trocar, use: -Dspring.profiles.active=hml (ou prod)
  profiles:
    active: dev

  # JPA / Hibernate - configurações comuns a todos os ambientes
  jpa:
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  # Flyway - versionamento de schema do banco
  #
  # baseline-on-migrate=true permite adotar o Flyway em bancos já existentes
  # (ex: HML no Supabase, onde as tabelas foram criadas pelo Hibernate antes
  # da FASE 6.1). Quando um banco tem tabelas mas não tem flyway_schema_history,
  # o Flyway cria a tabela de histórico e marca baseline-version como aplicada,
  # sem re-executar as migrations <= baseline-version.
  #
  # baseline-version=1 significa: em banco já populado, a V1 é considerada
  # "já aplicada" e não é re-executada (evita colisão de CREATE TABLE).
  # Em banco vazio (fresh install), Flyway roda a V1 normalmente, porque a
  # lógica de baseline só dispara em schemas não vazios.
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 1

  # MessageSource - mensagens da API resolvidas por chave em messages_pt_BR.properties
  messages:
    basename: messages
    encoding: UTF-8
    fallback-to-system-locale: false

# JWT - segredo via env var em ambientes remotos; default só para dev local
fiis:
  jwt:
    secret: ${FIIS_JWT_SECRET:chave-de-desenvolvimento-com-32-bytes-minimo-para-hs256}
    ttl-millis: 86400000
    issuer: fiis-api

# Swagger UI - ordenação alfabética das tags (deixa "Autenticação" no topo)
springdoc:
  swagger-ui:
    tags-sorter: alpha

# Porta da API (Render injeta ${PORT}; default 8081 em dev local)
server:
  port: ${PORT:8081}

# Encoding dos logs: evita caracteres corrompidos em consoles Windows
# (acentuação PT-BR fica legível tanto no console quanto em arquivos)
logging:
  charset:
    console: UTF-8
    file: UTF-8
