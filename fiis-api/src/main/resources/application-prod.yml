# ===========================================
# AMBIENTE: PRODUÇÃO (nuvem)
# ===========================================
# Conecta no PostgreSQL do Supabase (projeto de produção).
# As credenciais serão configuradas como variáveis de ambiente no Render.

spring:
  datasource:
    url: ${DATABASE_URL}
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      # TODO: voltar para "validate" quando o Flyway entrar (FASE 6.1).
      # Por enquanto usamos "update" em PROD para que o Hibernate crie/atualize
      # o schema no primeiro deploy — sem isso, a aplicação não sobe em um banco
      # vazio (validate exige schema pré-existente).
      ddl-auto: update
    show-sql: false

logging:
  level:
    com.renlip.fiis: INFO
