# ===========================================
# AMBIENTE: DEV (local)
# ===========================================
# Conecta no PostgreSQL rodando localmente via Docker.
# Para subir o banco: docker start fiis-postgres
# Para verificar:     docker ps

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/fiis
    username: renlip
    password: fiis123

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      # "validate" apenas confere se o schema do banco bate com as @Entity;
      # quem cria/altera tabelas é o Flyway (ver application.yml).
      ddl-auto: validate
    show-sql: true

logging:
  level:
    com.renlip.fiis: DEBUG
