##
# Este arquivo de propriedades contém as mensagens exibidas pela API ao cliente final,
# resolvidas pelo Spring MessageSource. A chave é referenciada em MensagemEnum e os
# valores aceitam placeholders posicionais ({0}, {1}, ...) formatados via MessageFormat.
#
# IMPORTANTE: as propriedades devem ser mantidas em ordem alfabética para facilitar a
# manutenção do arquivo e evitar duplicidade.
##

