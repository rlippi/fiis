<section class="fundos-list">
  <p-toolbar>
    <ng-template #start>
      <h1 class="title">Fundos</h1>
    </ng-template>
    <ng-template #end>
      <p-button
        label="Novo fundo"
        icon="pi pi-plus"
        [routerLink]="['/fundos', 'novo']"
      />
    </ng-template>
  </p-toolbar>

  <p-table
    #dt
    [value]="fundos()"
    [loading]="loading()"
    [paginator]="true"
    [rows]="10"
    [rowsPerPageOptions]="[10, 25, 50]"
    [globalFilterFields]="['ticker', 'nome', 'cnpj', 'tipoDescricao', 'segmentoDescricao']"
    [rowHover]="true"
    dataKey="id"
    styleClass="p-datatable-sm"
    responsiveLayout="stack"
    breakpoint="960px"
    paginatorPosition="bottom"
    currentPageReportTemplate="{first} a {last} de {totalRecords}"
    [showCurrentPageReport]="true"
  >
    <ng-template #caption>
      <div class="table-caption">
        <p-iconfield iconPosition="left">
          <p-inputicon class="pi pi-search" />
          <input
            pInputText
            type="text"
            placeholder="Buscar por ticker, nome, CNPJ..."
            [(ngModel)]="globalFilter"
            (input)="dt.filterGlobal(globalFilter(), 'contains')"
          />
        </p-iconfield>
      </div>
    </ng-template>

    <ng-template #header>
      <tr>
        <th pSortableColumn="ticker" style="width: 7rem">
          Ticker <p-sortIcon field="ticker" />
        </th>
        <th pSortableColumn="nome">Nome <p-sortIcon field="nome" /></th>
        <th pSortableColumn="tipoDescricao" style="width: 10rem">
          Tipo <p-sortIcon field="tipoDescricao" />
        </th>
        <th pSortableColumn="segmentoDescricao" style="width: 12rem">
          Segmento <p-sortIcon field="segmentoDescricao" />
        </th>
        <th pSortableColumn="ativo" style="width: 7rem">
          Status <p-sortIcon field="ativo" />
        </th>
        <th style="width: 8rem" class="col-acoes">Ações</th>
      </tr>
    </ng-template>

    <ng-template #body let-fundo>
      <tr>
        <td><strong>{{ fundo.ticker }}</strong></td>
        <td>{{ fundo.nome }}</td>
        <td>{{ fundo.tipoDescricao }}</td>
        <td>{{ fundo.segmentoDescricao }}</td>
        <td>
          @if (fundo.ativo) {
            <p-tag severity="success" value="Ativo" />
          } @else {
            <p-tag severity="secondary" value="Inativo" />
          }
        </td>
        <td class="col-acoes">
          <p-button
            icon="pi pi-pencil"
            [rounded]="true"
            [text]="true"
            severity="secondary"
            (onClick)="editar(fundo)"
            ariaLabel="Editar"
          />
          @if (fundo.ativo) {
            <p-button
              icon="pi pi-trash"
              [rounded]="true"
              [text]="true"
              severity="danger"
              (onClick)="confirmarDesativacao(fundo)"
              ariaLabel="Desativar"
            />
          }
        </td>
      </tr>
    </ng-template>

    <ng-template #emptymessage>
      <tr>
        <td colspan="6" class="empty">Nenhum fundo encontrado.</td>
      </tr>
    </ng-template>
  </p-table>
</section>
